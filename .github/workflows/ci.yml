name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install PDM
        run: python -m pip install pdm
      - name: Install dependencies
        run: pdm sync -G dev
      - name: Test
        run: pdm run pytest
